name: Deploy App to GCP VM

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - '.github/workflows/deploy-app.yml'

  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          GCP_SSH_KEY: ${{ secrets.GCP_SSH_KEY }}
        run: |
          if [ -z "$GCP_SSH_KEY" ]; then
            echo "ERROR: GCP_SSH_KEY secret is empty"
            exit 1
          fi

          mkdir -p ~/.ssh
          printf '%s\n' "$GCP_SSH_KEY" > ~/.ssh/id_rsa

          chmod 700 ~/.ssh
          chmod 600 ~/.ssh/id_rsa

      - name: Add VM to known_hosts
        env:
          GCP_HOST: ${{ secrets.GCP_HOST }}
        run: |
          if [ -z "$GCP_HOST" ]; then
            echo "ERROR: GCP_HOST secret is empty or not configured"
            exit 1
          fi

          ssh-keyscan -T 15 -H "$GCP_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Test SSH Connection
        env:
          GCP_HOST: ${{ secrets.GCP_HOST }}
          GCP_USER: ${{ secrets.GCP_USER }}
        run: |
          ssh \
            -i ~/.ssh/id_rsa \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            "$GCP_USER@$GCP_HOST" \
            "echo 'SSH connection successful'"

      - name: Deploy Docker App
        env:
          GCP_HOST: ${{ secrets.GCP_HOST }}
          GCP_USER: ${{ secrets.GCP_USER }}
        run: |
          ssh \
            -i ~/.ssh/id_rsa \
            "$GCP_USER@$GCP_HOST" << 'EOF'

            set -e

            cd /home/rohit/gcp-user-registration-atlas

            git fetch origin main
            git reset --hard origin/main

            cd app

            docker compose up -d --build --remove-orphans

            sleep 15

            curl --fail http://127.0.0.1/api/health

            docker image prune -f

            echo "Deployment successful"
          EOF
