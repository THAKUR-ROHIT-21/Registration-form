name: Deploy App to GCP VM

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - '.github/workflows/deploy-app.yml'

  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      GCP_HOST: ${{ secrets.GCP_HOST }}
      GCP_USER: ${{ secrets.GCP_USER }}
      GCP_SSH_KEY: ${{ secrets.GCP_SSH_KEY }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          if [ -z "$GCP_SSH_KEY" ]; then
            echo "ERROR: GCP_SSH_KEY secret is empty"
            exit 1
          fi

          mkdir -p ~/.ssh

          printf '%s\n' "$GCP_SSH_KEY" > ~/.ssh/id_ed25519

          chmod 700 ~/.ssh
          chmod 600 ~/.ssh/id_ed25519

          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null

          echo "SSH private key configured successfully"

      - name: Add VM to known_hosts
        run: |
          if [ -z "$GCP_HOST" ]; then
            echo "ERROR: GCP_HOST secret is empty"
            exit 1
          fi

          ssh-keyscan -H "$GCP_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

          echo "VM added to known_hosts successfully"

      - name: Test SSH Connection
        run: |
          if [ -z "$GCP_USER" ]; then
            echo "ERROR: GCP_USER secret is empty"
            exit 1
          fi

          ssh \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=20 \
            -i ~/.ssh/id_ed25519 \
            "$GCP_USER@$GCP_HOST" \
            "echo 'SSH connection successful' && hostname && whoami"

      - name: Deploy Docker App
        run: |
          ssh \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -i ~/.ssh/id_ed25519 \
            "$GCP_USER@$GCP_HOST" << 'EOF'
              set -e

              APP_DIR="/home/rohit/gcp-user-registration-atlas"

              if [ ! -d "$APP_DIR/.git" ]; then
                echo "ERROR: Application repository not found at $APP_DIR"
                exit 1
              fi

              cd "$APP_DIR"

              echo "Fetching latest code..."
              git fetch origin
              git reset --hard origin/main

              cd app

              echo "Building and starting Docker containers..."
              docker compose up -d --build

              echo "Current container status:"
              docker compose ps

              echo "Removing unused Docker images..."
              docker image prune -f

              echo "Waiting for application startup..."
              sleep 15

              echo "Running health check..."
              curl --fail \
                   --silent \
                   --show-error \
                   --retry 5 \
                   --retry-delay 5 \
                   http://127.0.0.1/api/health

              echo
              echo "Deployment completed successfully"
          EOF
