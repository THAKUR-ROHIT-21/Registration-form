<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Registration Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page-shell">
    <section class="card form-card">
      <h1>📝 User Registration</h1>

      <form id="userForm">
        <label for="name">Name:</label>
        <input id="name" name="name" type="text" placeholder="Enter your name" required maxlength="80">

        <label for="city">City:</label>
        <input id="city" name="city" type="text" placeholder="Enter your city" required maxlength="80">

        <label for="degree">Degree:</label>
        <select id="degree" name="degree" required>
          <option value="">Select Degree</option>
          <option>Bachelor's</option>
          <option>Master's</option>
          <option>B.Tech</option>
          <option>M.Tech</option>
          <option>BCA</option>
          <option>MCA</option>
          <option>MBA</option>
          <option>Diploma</option>
          <option>Other</option>
        </select>

        <button id="submitButton" type="submit">✅ Submit</button>
        <p id="formMessage" class="message" aria-live="polite"></p>
      </form>
    </section>

    <section class="card list-card">
      <h1>📊 Users List</h1>

      <div class="search-box">
        <span>🔍</span>
        <input id="searchInput" type="search" placeholder="Search users...">
      </div>

      <div id="usersList" class="users-list">
        <p class="empty-state">Loading users...</p>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
